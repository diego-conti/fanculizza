name: Fetch Latest Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p _data

          curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/diego-conti/fanculizzatore/releases/latest > /tmp/release.json
          
          TAG=$(jq -r '.tag_name // empty' /tmp/release.json)
          
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo '{"tag": "", "notes": "", "artifacts": []}' > _data/latest-release.json
            exit 0
          fi

          jq -r '.tag_name as $tag | .body as $body | .assets[] | select(.name | test(".(apk|exe|deb|rpm)$"; "i")) | {tag: $tag, notes: $body, name: .name, size: .size, download_url: .browser_download_url}' /tmp/release.json > /tmp/artifacts.json
          
          jq -s 'group_by(.tag) | map({tag: .[0].tag, notes: .[0].notes, assets: map({name: .name, size: .size, download_url: .download_url})}) | .[0]' /tmp/artifacts.json > _data/latest-release.json

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update latest release data"
          file_pattern: "_data/latest-release.json"
