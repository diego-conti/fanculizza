name: Fetch Latest Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p _data

          curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/diego-conti/fanculizzatore/releases/latest > /tmp/release.json
          
          TAG=$(jq -r '.tag_name // empty' /tmp/release.json)
          
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo '{"tag": "", "notes": "", "artifacts": []}' > _data/latest-release.json
            exit 0
          fi

          NOTES=$(jq -r '.body // ""' /tmp/release.json)
          
          jq -r '.assets[] | {name: .name, size: .size, download_url: .browser_download_url}' /tmp/release.json > /tmp/all_assets.json
          
          grep -E '\.(apk|exe|deb|rpm)$' /tmp/all_assets.json > /tmp/filtered_assets.json || true
          
          if [ -s /tmp/filtered_assets.json ]; then
            jq -s --arg tag "$TAG" --arg notes "$NOTES" '{tag: $tag, notes: $notes, assets: .}' /tmp/filtered_assets.json > _data/latest-release.json
          else
            jq -s --arg tag "$TAG" --arg notes "$NOTES" '{tag: $tag, notes: $notes, assets: []}' > _data/latest-release.json
          fi

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update latest release data"
          file_pattern: "_data/latest-release.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
