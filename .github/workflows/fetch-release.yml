name: Fetch Latest Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p _data

          RESPONSE=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/diego-conti/fanculizzatore/releases/latest)
          
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name // empty')
          
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo '{"tag": "", "notes": "", "artifacts": []}' > _data/latest-release.json
            exit 0
          fi

          echo "$RESPONSE" | jq "{tag: .tag_name, notes: .body, assets: [.assets[] | select(.name | test(\"\\.(apk|exe|deb|rpm)$\"; \"i\")) | {name: .name, size: .size, download_url: .browser_download_url}]}" > _data/latest-release.json

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update latest release data"
          file_pattern: "_data/latest-release.json"
