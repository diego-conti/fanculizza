name: Fetch Latest Release

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch latest release
        run: |
          mkdir -p _data
          mkdir -p downloads

          curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            https://api.github.com/repos/diego-conti/fanculizzatore/releases/latest > /tmp/release.json
          
          TAG=$(jq -r '.tag_name // empty' /tmp/release.json)
          
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo '{"tag": "", "notes": "", "artifacts": []}' > _data/latest-release.json
            exit 0
          fi

          NOTES=$(jq -r '.body // ""' /tmp/release.json)
          
          # Get filtered assets with download URLs as JSON array
          FILTERED_ASSETS_JSON=$(jq '[.assets[] | select(.name | endswith(".apk") or endswith(".exe") or endswith(".deb") or endswith(".rpm")) | {name: .name, size: .size, download_url: .browser_download_url}]' /tmp/release.json)
          
          # Initialize artifacts array
          ARTIFACTS_JSON="[]"
          
          # Process each filtered asset if any exist
          ASSET_COUNT=$(echo "$FILTERED_ASSETS_JSON" | jq -r 'length')
          if [ "$ASSET_COUNT" -gt 0 ]; then
            # Download each asset and store locally
            for i in $(seq 0 $((ASSET_COUNT - 1))); do
              # Extract asset properties
              NAME=$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].name")
              SIZE=$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].size")
              URL=$(echo "$FILTERED_ASSETS_JSON" | jq -r ".[$i].download_url")
              
              echo "Downloading $NAME..."
              curl -s -f -L -H "Authorization: token ${{ secrets.GH_TOKEN }}" -o "downloads/$NAME" "$URL" || echo "Warning: Failed to download $NAME"
              
              # Add to artifacts array for JSON
              ARTIFACTS_JSON=$(echo "$ARTIFACTS_JSON" | jq --arg name "$NAME" --arg size "$SIZE" --arg url "/downloads/$NAME" '. + [{name: $name, size: ($size|tonumber), download_url: $url}]')
            done
          fi
          
          # Create final JSON with local download URLs (or empty array if none)
          jq -s --arg tag "$TAG" --arg notes "$NOTES" '{tag: $tag, notes: $notes, artifacts: .}' <<< "$ARTIFACTS_JSON" > _data/latest-release.json

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update latest release data"
          file_pattern: "_data/latest-release.json downloads/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
